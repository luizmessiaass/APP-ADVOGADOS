# Android CI — Phase 0 baseline
# Decisions: D-18 (push/PR to main/master), D-19 (lint + test + assembleDemoDebug),
#            D-20 (no emulator tests), D-21 (Android-only, backend CI in Phase 1)

name: Android CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run lint
        run: ./gradlew :app-cliente:lintDemoDebug :app-escritorio:lintDebug

      - name: Run unit tests
        run: ./gradlew test

      - name: Assemble demo debug APK
        run: ./gradlew :app-cliente:assembleDemoDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: demo-debug-apk
          path: app-cliente/build/outputs/apk/demo/debug/*.apk

  app-escritorio-ci:
    name: app-escritorio CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Lint
        run: ./gradlew :app-escritorio:lint

      - name: Unit Tests
        run: ./gradlew :app-escritorio:test

      - name: Assemble Debug
        run: ./gradlew :app-escritorio:assembleDebug

      - name: Upload lint results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-results-app-escritorio
          path: app-escritorio/build/reports/lint-results-debug.html
