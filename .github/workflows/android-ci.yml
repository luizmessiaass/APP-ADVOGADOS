# Android CI — Phase 0 baseline + Phase 5 app-cliente dedicated job
# Decisions: D-18 (push/PR to main/master), D-19 (lint + test + assembleDemoDebug),
#            D-20 (no emulator tests), D-21 (Android-only, backend CI in Phase 1)

name: Android CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-app-cliente:
    name: app-cliente lint + test + build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Lint app-cliente
        run: ./gradlew :app-cliente:lintDemoDebug

      - name: Unit tests app-cliente
        run: ./gradlew :app-cliente:test

      - name: Assemble app-cliente demo debug
        run: ./gradlew :app-cliente:assembleDemoDebug

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-results-app-cliente
          path: app-cliente/build/reports/lint-results-demoDebug.html

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-app-cliente
          path: app-cliente/build/test-results/

  app-escritorio-ci:
    name: app-escritorio CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Lint
        run: ./gradlew :app-escritorio:lint

      - name: Unit Tests
        run: ./gradlew :app-escritorio:test

      - name: Assemble Debug
        run: ./gradlew :app-escritorio:assembleDebug

      - name: Upload lint results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-results-app-escritorio
          path: app-escritorio/build/reports/lint-results-debug.html
